[package]
product_name = eMachination CAD Patent Prompt-Rig
folder_name = eMachinationCADPatentPromptRig
portable_zip_name = emachination_cad_patent_prompt_rig_roughin_slim_portable.zip

[required_files]
files =
    README.md
    START_HERE.md
    LICENSE
    src/eMachination_Coding_Prompt_Rig.ahk
    prompts/index.ini
    launchers/Start eMachination CAD Patent Prompt-Rig.ahk
    launchers/Start eMachination CAD Patent Prompt-Rig.bat
    launchers/Stop eMachination CAD Patent Prompt-Rig.ahk
    launchers/Stop eMachination CAD Patent Prompt-Rig.bat
    setup/Create Desktop Shortcuts.ahk
    package/board_package.ini
    tools/build_portable_board_zip.py
    tools/compile_hotkey_board_linux.py
    src/linux/hotkey_board_runtime.py
    src/linux/terminal_copy_providers.py
    build/linux_hotkey_board/board_spec.json
    launchers/linux/start_hotkey_board.sh
    launchers/linux/start_transcript_terminal.sh
    launchers/linux/stop_hotkey_board.sh
    docs/linux_hotkey_board.md

[include]
paths =
    README.md
    START_HERE.md
    LICENSE
    src
    prompts
    launchers
    setup
    tools
    docs
    package
    build/linux_hotkey_board
    tests
    prompt_library_manifest.json

[skip]
dirs =
    .git
    .idea
    .vscode
    __pycache__
    .pytest_cache
    release
    releases
    tmp
    temp
    out

suffixes =
    .pyc
    .pyo
    .bak
    .backup
    .old
    .orig
    .log
    .lnk
    .exe

[linux_board]
source_ahk_path = src/eMachination_Coding_Prompt_Rig.ahk
prompts_index_path = prompts/index.ini
settings_path = config/settings.ini
output_spec_path = build/linux_hotkey_board/board_spec.json
expected_prompt_count = 72
fallback_launcher_hotkey = Ctrl+Alt+Space
